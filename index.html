<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Color Sweeper</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <section id="setup-screen" class="screen active">
      <div class="screen-shell">
        <header class="hero-card card">
          <div>
            <h1>Color Sweeper</h1>
            <p class="subtext">난이도 프리셋을 고르거나 세부 설정을 조정한 뒤 게임을 시작하세요.</p>
          </div>
          <button id="toggle-sound-btn" class="icon-btn" type="button" aria-label="사운드 켜기/끄기">🔊</button>
        </header>

        <main class="setup-layout">
          <section class="left-column">
            <div class="card">
              <div class="section-header">
                <h2>기본 난이도 프리셋</h2>
                <span id="selected-preset-badge" class="badge subtle">선택 없음</span>
              </div>
              <div id="builtin-preset-list" class="preset-grid"></div>
            </div>

            <div class="card">
              <div class="section-header">
                <h2>내 프리셋</h2>
                <div class="inline-actions">
                  <button id="export-btn" class="secondary-btn hidden" type="button">저장 데이터 복사하기</button>
                  <button id="import-btn" class="secondary-btn" type="button">저장 데이터 붙여넣기</button>
                </div>
              </div>
              <div id="custom-preset-empty" class="empty-state">저장된 사용자 프리셋이 없습니다.</div>
              <ul id="custom-preset-list" class="custom-preset-list"></ul>
            </div>

            <div id="clipboard-card" class="card hidden">
              <div class="section-header">
                <h2>외부용 저장 데이터</h2>
                <button id="close-clipboard-btn" class="text-btn" type="button">닫기</button>
              </div>
              <p class="subtext small">클립보드 권한이 제한될 경우 아래 텍스트를 직접 복사하거나 붙여넣어 사용할 수 있습니다.</p>
              <textarea id="clipboard-textarea" rows="8" spellcheck="false" placeholder="저장 데이터가 여기에 표시되거나, 붙여넣기 후 불러옵니다."></textarea>
              <div class="clipboard-actions">
                <button id="copy-textarea-btn" class="secondary-btn" type="button">텍스트 복사</button>
                <button id="apply-textarea-btn" class="primary-btn" type="button">텍스트 적용</button>
              </div>
            </div>
          </section>

          <section class="right-column">
            <div class="card">
              <div class="section-header">
                <h2>게임 시작 설정</h2>
                <button id="toggle-details-btn" class="secondary-btn" type="button">세부 설정 펼치기</button>
              </div>

              <div id="config-summary" class="config-summary muted">
                프리셋을 선택하면 요약이 표시됩니다.
              </div>

              <div id="details-panel" class="details-panel hidden">
                <div class="form-grid">
                  <label>
                    <span>프리셋 이름</span>
                    <input id="preset-name-input" type="text" maxlength="40" placeholder="예: 느긋한 테스트용" />
                  </label>

                  <label>
                    <span>스테이지 수</span>
                    <input id="stages-per-play-input" type="number" min="1" max="99" />
                  </label>

                  <label>
                    <span>초기 색상 수</span>
                    <input id="initial-color-count-input" type="number" min="2" max="20" />
                  </label>

                  <label>
                    <span>초기 가로/세로 칸 수</span>
                    <input id="initial-board-size-input" type="number" min="3" max="20" />
                  </label>

                  <label>
                    <span>색상 증가 포인트 (n스테이지 클리어마다)</span>
                    <input id="color-increase-every-input" type="number" min="1" max="20" />
                  </label>

                  <label>
                    <span>색상 증가 개수</span>
                    <input id="color-increase-amount-input" type="number" min="0" max="10" />
                  </label>

                  <label>
                    <span>칸 수 증가 포인트 (n스테이지 클리어마다)</span>
                    <input id="board-increase-every-input" type="number" min="1" max="20" />
                  </label>

                  <label>
                    <span>칸 수 증가 개수</span>
                    <input id="board-increase-amount-input" type="number" min="0" max="5" />
                  </label>

                  <label>
                    <span>최대 색상 수</span>
                    <input id="max-color-count-input" type="number" min="2" max="20" />
                  </label>

                  <label>
                    <span>최대 가로/세로 칸 수</span>
                    <input id="max-board-size-input" type="number" min="3" max="25" />
                  </label>

                  <label>
                    <span>시작 선택 횟수</span>
                    <input id="initial-moves-input" type="number" min="1" max="99" />
                  </label>

                  <label>
                    <span>스테이지 클리어 시 추가 횟수</span>
                    <input id="stage-clear-move-bonus-input" type="number" min="0" max="50" />
                  </label>

                  <label>
                    <span>보드 확장 시 추가 보너스</span>
                    <input id="board-grow-move-bonus-input" type="number" min="0" max="50" />
                  </label>
                </div>

                <div class="details-actions">
                  <button id="save-preset-btn" class="secondary-btn" type="button">프리셋 저장</button>
                  <button id="save-as-new-btn" class="secondary-btn" type="button">새 프리셋으로 저장</button>
                </div>
              </div>

              <div class="start-actions">
                <button id="start-game-btn" class="primary-btn" type="button" disabled>게임 시작</button>
              </div>
            </div>
          </section>
        </main>
      </div>
    </section>

    <section id="play-screen" class="screen">
      <div class="play-shell">
        <header class="play-topbar card">
          <div class="topbar-left">
            <button id="give-up-btn" class="danger-btn" type="button">게임 포기</button>
            <div id="move-counter" class="move-counter">선택 횟수: 0</div>
          </div>
          <div class="topbar-right">
            <div id="stage-indicator" class="badge">Stage 1</div>
            <button id="play-sound-toggle-btn" class="icon-btn" type="button" aria-label="사운드 켜기/끄기">🔊</button>
          </div>
        </header>

        <main class="play-main">
          <section class="board-section card">
            <div class="board-meta">
              <div id="board-info" class="subtext">5x5 · 3색</div>
              <div id="board-status" class="subtext">빈 영역을 넓혀서 보드를 모두 비우세요.</div>
            </div>
            <div id="board-wrapper">
              <div id="board"></div>
            </div>
          </section>

          <footer class="color-toolbar-shell card">
            <div class="toolbar-title">색상 선택</div>
            <div id="color-toolbar" class="color-toolbar"></div>
          </footer>
        </main>
      </div>
    </section>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-card card">
        <h2 id="overlay-title">알림</h2>
        <p id="overlay-message"></p>
        <button id="overlay-action-btn" class="primary-btn" type="button">확인</button>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
